name: Deploy Zola site to Pages
on:
  push:
    branches: [main] # 每次推送到 main 时触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # 确保下载了 deepthought 主题

      - name: Install Zola
        run: |
          # 自动获取最新版本并安装
          curl -L https://github.com/getzola/zola/releases/latest/download/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x zola

      - name: Build
        run: ./zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4