name: Deploy Zola
on:
  push:
    branches:
      - main  # 每次你推送到 main 分支时触发
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Deploy
        uses: shalzz/zola-deploy-action@v0.19.1
        env:
          PAGES_BRANCH: gh-pages # 编译后的 HTML 放在这个分支
          BUILD_DIR: public